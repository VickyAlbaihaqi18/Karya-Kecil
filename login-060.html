<!DOCTYPE html>
<html lang="id">

    <main style="display: flex; align-items: center;">
        <div class="container">
            <div class="card" style="max-width: 450px; margin: 0 auto;">
                <h2 class="text-primary text-center mb-4">Login Sistem</h2>
                <form id="formLogin">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Masukkan username admin">
                    </div>
                    <div class="form-group mb-4">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Masukkan password">
                    </div>
                    <button type="submit" class="btn btn-primary">Masuk ke Sistem</button>
                </form>
            </div>
        </div>
    </main>
